<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Shadhin Motor Admin Dashboard — Seat Cover Shop Management">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0a0f1e" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#e8ecf2" media="(prefers-color-scheme: light)">
<script>
(() => {
  const root = document.documentElement;
  const fallback = root.getAttribute("data-theme") || "dark";
  let theme = fallback;
  try {
    const saved = window.localStorage.getItem("sm_theme");
    if (saved === "light" || saved === "dark") theme = saved;
  } catch {}
  root.setAttribute("data-theme", theme);
  root.setAttribute("data-bs-theme", theme);
})();
</script>
<title>Shadhin Motor — Login</title>

<!-- Bootstrap Icons -->
<link href="assets/css/bootstrap-icons.min.css" rel="stylesheet">
<!-- SweetAlert2 -->
<link href="assets/css/sweetalert2.min.css" rel="stylesheet">
<!-- Google Fonts -->
<link href="assets/css/google-fonts.css" rel="stylesheet">

<link href="assets/css/shared/base.css" rel="stylesheet">
<link href="assets/css/login.css" rel="stylesheet">

</head>

<body class="preloading" data-page="login">

<!-- PRELOADER -->
<div id="pre" role="status" aria-label="Loading page">

</div>
<!-- LOGIN -->

        <div>

    <form id="loginForm">
      <div class="login-field-wrap">
        <label class="login-lbl" for="loginUser">Username or Email</label>
        <div class="login-input-row">
          <span class="login-field-icon"><i class="bi bi-person-circle"></i></span>
          <input class="login-input" id="loginUser" type="text" placeholder="Enter username or email" autocomplete="username">
        </div>
      </div>
      <div class="login-field-wrap">
        <label class="login-lbl" for="loginPass">Password</label>
        <div class="login-input-row">
          <span class="login-field-icon"><i class="bi bi-shield-lock"></i></span>
          <input class="login-input" id="loginPass" type="password" placeholder="Enter password" autocomplete="current-password">
          <button class="login-eye-btn" type="button" data-action="login-pass-toggle" aria-label="Toggle password visibility">
            <i class="bi bi-eye-slash" id="loginPassIc"></i>
          </button>
        </div>
      </div>
      <button class="login-submit-btn" id="loginBtn" type="submit">
        <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
        <span>Sign In</span>

    </form>

</div>
