<!DOCTYPE html>
<html lang="en" data-theme="light" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shadhin Motor Admin Dashboard login">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#e8ecf2">
  <title>Shadhin Motor — Login</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link href="assets/css/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/google-fonts.css" rel="stylesheet">
  <link href="assets/css/shared/base.css" rel="stylesheet">
  <link href="assets/css/auth/page.css" rel="stylesheet">
</head>

<body data-page="login">
  <main id="loginWrap" class="auth-wrap">
    <section class="login-card auth-card" aria-labelledby="loginTitle">
      <div class="login-brand">
        <a class="login-logo-wrap login-brand-link" href="dashboard.html" aria-label="Open dashboard preview">
          <img class="login-logo-img" src="assets/images/brand-logo.svg" alt="" width="46" height="46" decoding="async">
          <div>
            <h1 class="login-title" id="loginTitle">Shadhin <em>Motor</em></h1>
            <p class="login-sub">Admin Login</p>
          </div>
        </a>
        <div class="login-divider"></div>
      </div>

      <form id="loginForm" class="auth-form" action="/admin/login" method="post">
        <div class="login-field-wrap">
          <label class="login-lbl" for="loginEmail">Email</label>
          <div class="login-input-row">
            <span class="login-field-icon"><i class="bi bi-envelope" aria-hidden="true"></i></span>
            <input class="login-input" id="loginEmail" name="email" type="email" placeholder="admin@example.com"
              autocomplete="email" required>
          </div>
        </div>
        <div class="login-field-wrap">
          <label class="login-lbl" for="loginPass">Password</label>
          <div class="login-input-row">
            <span class="login-field-icon"><i class="bi bi-shield-lock" aria-hidden="true"></i></span>
            <input class="login-input" id="loginPass" name="password" type="password" placeholder="Enter password"
              autocomplete="current-password" required>
          </div>
        </div>

        <div class="auth-row">
          <label class="auth-check"><input type="checkbox" name="remember"> Remember me</label>
          <a class="auth-link" href="forgot-password.html">Forgot password?</a>
        </div>

        <button class="login-submit-btn" id="loginBtn" type="submit">
          <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
          <span>Sign In</span>
        </button>
      </form>

      <div class="auth-divider"><span>or continue with</span></div>
      <div class="auth-social" role="group" aria-label="Social login options">
        <button class="auth-provider google" type="button" aria-label="Continue with Google"><i class="bi bi-google"
            aria-hidden="true"></i></button>
        <button class="auth-provider facebook" type="button" aria-label="Continue with Facebook"><i
            class="bi bi-facebook" aria-hidden="true"></i></button>
        <button class="auth-provider linkedin" type="button" aria-label="Continue with LinkedIn"><i
            class="bi bi-linkedin" aria-hidden="true"></i></button>
        <button class="auth-provider github" type="button" aria-label="Continue with GitHub"><i class="bi bi-github"
            aria-hidden="true"></i></button>
        <button class="auth-provider apple" type="button" aria-label="Continue with Apple"><i class="bi bi-apple"
            aria-hidden="true"></i></button>
      </div>

      <p class="auth-switch">New here? <a href="register.html">Create an account</a></p>
    </section>
  </main>
</body>

</html>
