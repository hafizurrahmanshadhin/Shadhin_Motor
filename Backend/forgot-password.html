<!DOCTYPE html>
<html lang="en" data-theme="light" data-bs-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Reset Shadhin Motor admin password">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#e8ecf2">
<title>Shadhin Motor — Forgot Password</title>
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link href="assets/css/bootstrap-icons.min.css" rel="stylesheet">
<link href="assets/css/google-fonts.css" rel="stylesheet">
<link href="assets/css/shared/base.css" rel="stylesheet">
<link href="assets/css/auth/page.css" rel="stylesheet">
</head>

<body data-page="forgot-password">
<main id="loginWrap" class="auth-wrap">
  <section class="login-card auth-card" aria-labelledby="forgotTitle">
    <div class="login-brand">
      <a class="login-logo-wrap login-brand-link" href="login.html" aria-label="Back to login">
        <img class="login-logo-img" src="assets/images/brand-logo.svg" alt="" width="46" height="46" decoding="async">
        <div>
          <h1 class="login-title" id="forgotTitle">Forgot <em>Password</em></h1>
          <p class="login-sub">Send OTP</p>
        </div>
      </a>
      <div class="login-divider"></div>
    </div>

    <p class="auth-copy">Enter your admin email address. In Laravel, this form can send a one-time password to the user.</p>

    <form class="auth-form" action="verify-otp.html" method="get">
      <div class="login-field-wrap">
        <label class="login-lbl" for="forgotEmail">Email</label>
        <div class="login-input-row">
          <span class="login-field-icon"><i class="bi bi-envelope"></i></span>
          <input class="login-input" id="forgotEmail" name="email" type="email" placeholder="admin@example.com" autocomplete="email" required>
        </div>
      </div>
      <button class="login-submit-btn" type="submit">
        <i class="bi bi-send" aria-hidden="true"></i>
        <span>Send OTP</span>
      </button>
    </form>

    <p class="auth-switch"><a href="login.html">Back to sign in</a></p>
  </section>
</main>
</body>
</html>
