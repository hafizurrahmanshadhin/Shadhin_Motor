<!DOCTYPE html>
<html lang="en" data-theme="light" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Set a new Shadhin Motor admin password">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#e8ecf2">
  <title>Shadhin Motor — Change Password</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link href="assets/css/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/google-fonts.css" rel="stylesheet">
  <link href="assets/css/shared/base.css" rel="stylesheet">
  <link href="assets/css/auth/page.css" rel="stylesheet">
</head>

<body data-page="reset-password">
  <main id="loginWrap" class="auth-wrap">
    <section class="login-card auth-card" aria-labelledby="resetTitle">
      <div class="login-brand">
        <a class="login-logo-wrap login-brand-link" href="login.html" aria-label="Back to login">
          <img class="login-logo-img" src="assets/images/brand-logo.svg" alt="" width="46" height="46" decoding="async">
          <div>
            <h1 class="login-title" id="resetTitle">Change <em>Password</em></h1>
            <p class="login-sub">Update Access</p>
          </div>
        </a>
        <div class="login-divider"></div>
      </div>

      <form class="auth-form" action="login.html" method="get">
        <div class="login-field-wrap">
          <label class="login-lbl" for="newPassword">New Password</label>
          <div class="login-input-row">
            <span class="login-field-icon"><i class="bi bi-shield-lock"></i></span>
            <input class="login-input" id="newPassword" name="password" type="password"
              placeholder="Minimum 8 characters" autocomplete="new-password" minlength="8" required>
          </div>
        </div>
        <div class="login-field-wrap">
          <label class="login-lbl" for="confirmPassword">Confirm Password</label>
          <div class="login-input-row">
            <span class="login-field-icon"><i class="bi bi-shield-check"></i></span>
            <input class="login-input" id="confirmPassword" name="password_confirmation" type="password"
              placeholder="Repeat new password" autocomplete="new-password" minlength="8" required>
          </div>
        </div>
        <button class="login-submit-btn" type="submit">
          <i class="bi bi-check2-circle" aria-hidden="true"></i>
          <span>Update Password</span>
        </button>
      </form>

      <p class="auth-switch"><a href="login.html">Back to sign in</a></p>
    </section>
  </main>
</body>

</html>
